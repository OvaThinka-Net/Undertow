<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set Credentials — Undertow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--green:#3fb950;--red:#f85149;--yellow:#d29922;--radius:8px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:440px}
.banner{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-size:.88em;color:var(--yellow);line-height:1.5}
h1{font-size:1.3em;margin-bottom:4px}
.sub{font-size:.88em;color:var(--dim);margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.82em;font-weight:500;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.95em;outline:none;transition:border-color .2s;font-family:inherit}
.field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(63,185,80,.1)}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.btn{width:100%;padding:12px;border:none;border-radius:6px;background:var(--green);color:#000;font-size:.95em;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.error{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:6px;padding:10px 14px;margin-bottom:16px;color:var(--red);font-size:.88em;display:none}
.success{background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.3);border-radius:6px;padding:10px 14px;margin-bottom:16px;color:var(--green);font-size:.88em;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="banner">⚠ Default credentials detected. Set your username and password before continuing.</div>
  <h1>⚡ Set Admin Credentials</h1>
  <p class="sub">This is required before accessing the admin panel.</p>
  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>
  <form id="credsForm" onsubmit="return submitCreds(event)">
    <div class="field">
      <label for="newUsername">New Username</label>
      <input type="text" id="newUsername" required autofocus autocomplete="username" minlength="3" maxlength="64" placeholder="Choose a username (min 3 chars)">
    </div>
    <hr class="divider">
    <div class="field">
      <label for="currentPassword">Current Password</label>
      <input type="password" id="currentPassword" required autocomplete="current-password" placeholder="Enter current password">
    </div>
    <div class="field">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" required minlength="6" autocomplete="new-password" placeholder="Choose a new password (min 6 chars)">
    </div>
    <div class="field">
      <label for="confirmPassword">Confirm New Password</label>
      <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password" placeholder="Confirm your new password">
    </div>
    <button class="btn" type="submit" id="submitBtn">Save &amp; Continue</button>
  </form>
</div>
<script>
// Load current username
fetch('/api/credentials-status').then(r=>r.json()).then(d=>{
  if(d.username) document.getElementById('newUsername').value = d.username;
  if(!d.must_change) window.location.href = '/';
}).catch(()=>{});

async function submitCreds(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  const okEl = document.getElementById('successMsg');
  errEl.style.display = 'none';
  okEl.style.display = 'none';

  const usr = document.getElementById('newUsername').value.trim();
  const cur = document.getElementById('currentPassword').value;
  const nw = document.getElementById('newPassword').value;
  const cf = document.getElementById('confirmPassword').value;

  if (usr.length < 3) { errEl.textContent = 'Username must be at least 3 characters'; errEl.style.display = 'block'; return false; }
  if (nw.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return false; }
  if (nw !== cf) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return false; }

  btn.disabled = true;
  try {
    const r = await fetch('/api/change-credentials', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({current_password: cur, new_username: usr, new_password: nw})
    });
    const d = await r.json();
    if (d.ok) {
      okEl.textContent = 'Credentials saved! Redirecting...';
      okEl.style.display = 'block';
      setTimeout(() => { window.location.href = '/'; }, 1000);
    } else {
      errEl.textContent = d.error || 'Failed to change credentials';
      errEl.style.display = 'block';
    }
  } catch(ex) {
    errEl.textContent = 'Network error';
    errEl.style.display = 'block';
  }
  btn.disabled = false;
  return false;
}
</script>
</body>
</html>
